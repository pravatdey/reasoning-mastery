name: Daily Reasoning Video

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      part_number:
        description: 'Part number (empty = next)'
        required: false
        default: ''
      test_mode:
        description: 'Upload as private?'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup YouTube credentials
        run: |
          mkdir -p config
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > config/client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > config/youtube_token.json

      - name: Generate and upload video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.part_number }}" ]; then
            ARGS="$ARGS --part ${{ github.event.inputs.part_number }}"
          fi
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          python main.py $ARGS

      - name: Save progress to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git diff --cached --quiet || git commit -m "Update progress: $(cat progress.json | python -c 'import sys,json; print(f\"Part {json.load(sys.stdin)[\"next_part\"]-1} completed\")')"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ github.run_number }}
          path: |
            output/videos/
            output/thumbnails/
            output/scripts/
            logs/
          retention-days: 7
