syllabus:
  name: "Verbal & Analytical Reasoning for Competitive Exams"
  total_parts: 200

  sections:
    # ============================================================
    # VERBAL REASONING (Parts 1-100)
    # ============================================================
    - name: "Number Series"
      category: "verbal_reasoning"
      topics:
        - part: 1
          title: "Number Series - Basics & Patterns"
          subtopics: ["Ascending/Descending", "Arithmetic Progression", "Common difference"]
          difficulty: "beginner"
          formulas: ["a_n = a_1 + (n-1)d", "S_n = n/2 × (2a + (n-1)d)"]
          duration_target_minutes: 8

        - part: 2
          title: "Number Series - Geometric & Mixed Patterns"
          subtopics: ["Geometric Progression", "Mixed series", "Alternating patterns"]
          difficulty: "beginner"
          formulas: ["a_n = a_1 × r^(n-1)", "S_n = a(r^n - 1)/(r - 1)"]
          duration_target_minutes: 8

        - part: 3
          title: "Number Series - Square & Cube Based"
          subtopics: ["Perfect squares", "Perfect cubes", "Square root patterns"]
          difficulty: "intermediate"
          formulas: ["n² series", "n³ series", "n² ± k patterns"]
          duration_target_minutes: 8

        - part: 4
          title: "Number Series - Fibonacci & Special Sequences"
          subtopics: ["Fibonacci series", "Triangular numbers", "Prime number series"]
          difficulty: "intermediate"
          formulas: ["F(n) = F(n-1) + F(n-2)", "T_n = n(n+1)/2"]
          duration_target_minutes: 8

        - part: 5
          title: "Number Series - Two-Tier & Complex Patterns"
          subtopics: ["Difference of differences", "Product-based series", "Nested operations"]
          difficulty: "advanced"
          formulas: ["Second-order differences", "Multiplicative patterns"]
          duration_target_minutes: 10

        - part: 6
          title: "Number Series - Wrong Number Detection"
          subtopics: ["Finding odd one out", "Error identification", "Pattern verification"]
          difficulty: "advanced"
          formulas: ["Pattern consistency check methods"]
          duration_target_minutes: 8

    - name: "Letter & Alpha-Numeric Series"
      category: "verbal_reasoning"
      topics:
        - part: 7
          title: "Letter Series - Basic Patterns"
          subtopics: ["Alphabetical position", "Forward/backward skip", "Vowel-consonant patterns"]
          difficulty: "beginner"
          formulas: ["A=1, B=2, ..., Z=26", "Position arithmetic"]
          duration_target_minutes: 8

        - part: 8
          title: "Letter Series - Advanced Patterns"
          subtopics: ["Reverse alphabet coding", "Multiple letter shifts", "Cyclic patterns"]
          difficulty: "intermediate"
          formulas: ["Reverse position: 27-n", "Modular arithmetic for letters"]
          duration_target_minutes: 8

        - part: 9
          title: "Alpha-Numeric Series"
          subtopics: ["Combined letter-number patterns", "Position-value mapping", "Mixed sequences"]
          difficulty: "intermediate"
          formulas: ["Letter-number conversion formulas"]
          duration_target_minutes: 8

    - name: "Coding-Decoding"
      category: "verbal_reasoning"
      topics:
        - part: 10
          title: "Coding-Decoding - Letter Shifting"
          subtopics: ["Simple shift codes", "Position-based coding", "Forward/backward shifts"]
          difficulty: "beginner"
          formulas: ["Shift = Coded - Original position"]
          duration_target_minutes: 8

        - part: 11
          title: "Coding-Decoding - Number Coding"
          subtopics: ["Letter to number codes", "Reverse coding", "Mathematical operation codes"]
          difficulty: "beginner"
          formulas: ["Position values", "Arithmetic operations on codes"]
          duration_target_minutes: 8

        - part: 12
          title: "Coding-Decoding - Symbol & Mixed Coding"
          subtopics: ["Symbol substitution", "Conditional coding rules", "Multiple rule systems"]
          difficulty: "intermediate"
          formulas: ["Rule identification technique"]
          duration_target_minutes: 8

        - part: 13
          title: "Coding-Decoding - Sentence & Word Coding"
          subtopics: ["Word-level coding", "Sentence comparison method", "Code elimination"]
          difficulty: "intermediate"
          formulas: ["Comparison matrix method"]
          duration_target_minutes: 8

        - part: 14
          title: "Coding-Decoding - Advanced & New Pattern"
          subtopics: ["Binary coding", "Ternary coding", "Matrix-based coding"]
          difficulty: "advanced"
          formulas: ["Binary conversion", "Matrix operations"]
          duration_target_minutes: 10

    - name: "Analogy"
      category: "verbal_reasoning"
      topics:
        - part: 15
          title: "Analogy - Number Analogy"
          subtopics: ["Square/cube relationships", "Ratio-based", "Operation-based analogies"]
          difficulty: "beginner"
          formulas: ["Common number relationships"]
          duration_target_minutes: 8

        - part: 16
          title: "Analogy - Letter Analogy"
          subtopics: ["Position-based letter pairs", "Reverse pairs", "Skip patterns"]
          difficulty: "beginner"
          formulas: ["Opposite letter pairs: A-Z, B-Y, etc."]
          duration_target_minutes: 8

        - part: 17
          title: "Analogy - Word Analogy"
          subtopics: ["Synonym/Antonym pairs", "Cause-Effect", "Part-Whole relationships"]
          difficulty: "intermediate"
          formulas: ["Relationship identification framework"]
          duration_target_minutes: 8

        - part: 18
          title: "Analogy - Mixed & Advanced"
          subtopics: ["Multi-step analogies", "Complex relationships", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Multi-layer analogy solving"]
          duration_target_minutes: 8

    - name: "Classification (Odd One Out)"
      category: "verbal_reasoning"
      topics:
        - part: 19
          title: "Classification - Number Classification"
          subtopics: ["Prime vs composite", "Even/Odd grouping", "Mathematical property"]
          difficulty: "beginner"
          formulas: ["Number properties", "Divisibility rules"]
          duration_target_minutes: 8

        - part: 20
          title: "Classification - Letter & Word Classification"
          subtopics: ["Vowel/consonant groups", "Semantic categories", "Position-based groups"]
          difficulty: "beginner"
          formulas: ["Category identification"]
          duration_target_minutes: 8

        - part: 21
          title: "Classification - Advanced & Mixed"
          subtopics: ["Multi-criteria classification", "Hidden patterns", "Complex groupings"]
          difficulty: "intermediate"
          formulas: ["Multi-attribute analysis"]
          duration_target_minutes: 8

    - name: "Blood Relations"
      category: "verbal_reasoning"
      topics:
        - part: 22
          title: "Blood Relations - Basic Relationships"
          subtopics: ["Parent-child", "Sibling relations", "Spouse relations", "Family tree basics"]
          difficulty: "beginner"
          formulas: ["Relationship mapping chart"]
          duration_target_minutes: 8

        - part: 23
          title: "Blood Relations - Complex Problems"
          subtopics: ["Multi-generation problems", "Coded relationships", "Mixed gender puzzles"]
          difficulty: "intermediate"
          formulas: ["Generation counting method"]
          duration_target_minutes: 8

        - part: 24
          title: "Blood Relations - Coded & Symbolic"
          subtopics: ["Symbol-based relations", "Operator-based coding", "Complex coded problems"]
          difficulty: "advanced"
          formulas: ["Symbol decoding technique"]
          duration_target_minutes: 10

        - part: 25
          title: "Blood Relations - Family Tree & Advanced"
          subtopics: ["Complete family tree construction", "Multiple families", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Tree construction method"]
          duration_target_minutes: 10

    - name: "Direction Sense"
      category: "verbal_reasoning"
      topics:
        - part: 26
          title: "Direction Sense - Basic Concepts"
          subtopics: ["Cardinal directions", "Left/Right turns", "Distance calculation"]
          difficulty: "beginner"
          formulas: ["Pythagoras theorem for distance", "Direction after turns"]
          duration_target_minutes: 8

        - part: 27
          title: "Direction Sense - Shadow & Clock Problems"
          subtopics: ["Shadow direction by time", "Sun position", "Clock-based direction"]
          difficulty: "intermediate"
          formulas: ["Shadow rules: morning=West, evening=East"]
          duration_target_minutes: 8

        - part: 28
          title: "Direction Sense - Complex Navigation"
          subtopics: ["Multiple turns", "Shortest distance", "Displacement problems"]
          difficulty: "intermediate"
          formulas: ["Net displacement = √(x² + y²)"]
          duration_target_minutes: 8

        - part: 29
          title: "Direction Sense - Advanced Problems"
          subtopics: ["Relative positions", "Map-based problems", "Combined problems"]
          difficulty: "advanced"
          formulas: ["Coordinate geometry application"]
          duration_target_minutes: 10

    - name: "Ranking & Order"
      category: "verbal_reasoning"
      topics:
        - part: 30
          title: "Ranking & Order - Linear Arrangement"
          subtopics: ["Position from left/right", "Total count formulas", "Between positions"]
          difficulty: "beginner"
          formulas: ["Total = Left + Right - 1", "Between = |Pos1 - Pos2| - 1"]
          duration_target_minutes: 8

        - part: 31
          title: "Ranking & Order - Comparison Based"
          subtopics: ["Height/weight ranking", "Score-based ordering", "Insufficient data"]
          difficulty: "intermediate"
          formulas: ["Minimum/Maximum position calculation"]
          duration_target_minutes: 8

        - part: 32
          title: "Ranking & Order - Advanced Problems"
          subtopics: ["Row/column-based ranking", "Interchange positions", "Complex ordering"]
          difficulty: "advanced"
          formulas: ["Matrix position formulas"]
          duration_target_minutes: 8

    - name: "Sitting Arrangement (Linear)"
      category: "verbal_reasoning"
      topics:
        - part: 33
          title: "Linear Arrangement - Single Row Basics"
          subtopics: ["Facing same direction", "Position fixing", "Neighbor conditions"]
          difficulty: "beginner"
          formulas: ["n! arrangements", "Constraint-based elimination"]
          duration_target_minutes: 8

        - part: 34
          title: "Linear Arrangement - Two Row Facing"
          subtopics: ["Two parallel rows", "Facing each other", "Opposite person identification"]
          difficulty: "intermediate"
          formulas: ["Mirror position mapping"]
          duration_target_minutes: 10

        - part: 35
          title: "Linear Arrangement - Advanced Problems"
          subtopics: ["Multiple conditions", "Minimum/maximum gaps", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Elimination technique"]
          duration_target_minutes: 10

    - name: "Sitting Arrangement (Circular)"
      category: "verbal_reasoning"
      topics:
        - part: 36
          title: "Circular Arrangement - Basics"
          subtopics: ["Clockwise/anticlockwise", "Facing center/outside", "Adjacent positions"]
          difficulty: "beginner"
          formulas: ["(n-1)! circular arrangements"]
          duration_target_minutes: 8

        - part: 37
          title: "Circular Arrangement - Facing In/Out"
          subtopics: ["Mixed facing direction", "Left/right in circular", "Position identification"]
          difficulty: "intermediate"
          formulas: ["Circular left-right rules"]
          duration_target_minutes: 10

        - part: 38
          title: "Circular Arrangement - Advanced Problems"
          subtopics: ["Complex multi-condition", "Combined linear-circular", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Systematic elimination"]
          duration_target_minutes: 10

    - name: "Syllogism"
      category: "verbal_reasoning"
      topics:
        - part: 39
          title: "Syllogism - Venn Diagram Method"
          subtopics: ["All, Some, No statements", "Drawing Venn diagrams", "Valid conclusions"]
          difficulty: "beginner"
          formulas: ["All A are B → A ⊂ B", "Some A are B → A ∩ B ≠ ∅", "No A is B → A ∩ B = ∅"]
          duration_target_minutes: 8

        - part: 40
          title: "Syllogism - Two Statement Problems"
          subtopics: ["Positive conclusions", "Negative conclusions", "Possibility cases"]
          difficulty: "beginner"
          formulas: ["Conclusion validity rules"]
          duration_target_minutes: 8

        - part: 41
          title: "Syllogism - Either-Or & Complementary"
          subtopics: ["Either-or conclusions", "Complementary pairs", "Universal-particular pairs"]
          difficulty: "intermediate"
          formulas: ["Complementary pair: All A are B + Some A are not B"]
          duration_target_minutes: 8

        - part: 42
          title: "Syllogism - Three+ Statements"
          subtopics: ["Multiple statements", "Chain conclusions", "Complex problems"]
          difficulty: "intermediate"
          formulas: ["Chain rule: All A=B, All B=C → All A=C"]
          duration_target_minutes: 10

        - part: 43
          title: "Syllogism - Possibility Based"
          subtopics: ["'Can be' conclusions", "Reverse possibility", "Definite vs possible"]
          difficulty: "advanced"
          formulas: ["Possibility rules"]
          duration_target_minutes: 10

        - part: 44
          title: "Syllogism - Advanced & Negative Statements"
          subtopics: ["Only, Only a few, At least", "Negative premises", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Modern syllogism patterns"]
          duration_target_minutes: 10

    - name: "Statement & Assumptions"
      category: "verbal_reasoning"
      topics:
        - part: 45
          title: "Statement & Assumptions - Basics"
          subtopics: ["What is an assumption", "Implicit vs explicit", "Common assumption types"]
          difficulty: "beginner"
          formulas: ["Assumption identification framework"]
          duration_target_minutes: 8

        - part: 46
          title: "Statement & Assumptions - Practice"
          subtopics: ["Advertisement-based", "Policy-based", "Advice-based statements"]
          difficulty: "intermediate"
          formulas: ["Category-based approach"]
          duration_target_minutes: 8

    - name: "Statement & Conclusions"
      category: "verbal_reasoning"
      topics:
        - part: 47
          title: "Statement & Conclusions - Basics"
          subtopics: ["Logical deduction", "Over-generalization trap", "Scope of conclusion"]
          difficulty: "beginner"
          formulas: ["Conclusion validity test"]
          duration_target_minutes: 8

        - part: 48
          title: "Statement & Conclusions - Advanced"
          subtopics: ["Multiple conclusions", "Definite vs probable", "Practice problems"]
          difficulty: "intermediate"
          formulas: ["Strength of conclusion analysis"]
          duration_target_minutes: 8

    - name: "Statement & Course of Action"
      category: "verbal_reasoning"
      topics:
        - part: 49
          title: "Statement & Course of Action"
          subtopics: ["Practicality test", "Root cause addressing", "Extreme actions"]
          difficulty: "intermediate"
          formulas: ["Action validity framework"]
          duration_target_minutes: 8

    - name: "Statement & Arguments"
      category: "verbal_reasoning"
      topics:
        - part: 50
          title: "Statement & Arguments - Strong vs Weak"
          subtopics: ["Strong argument criteria", "Weak argument identification", "Relevance test"]
          difficulty: "intermediate"
          formulas: ["Argument strength evaluation"]
          duration_target_minutes: 8

    - name: "Cause & Effect"
      category: "verbal_reasoning"
      topics:
        - part: 51
          title: "Cause & Effect Reasoning"
          subtopics: ["Identifying cause", "Identifying effect", "Independent events", "Common cause"]
          difficulty: "intermediate"
          formulas: ["Temporal and logical relationship test"]
          duration_target_minutes: 8

    - name: "Logical Venn Diagrams"
      category: "verbal_reasoning"
      topics:
        - part: 52
          title: "Logical Venn Diagrams - Basics"
          subtopics: ["Two-set diagrams", "Subset relationships", "Disjoint sets"]
          difficulty: "beginner"
          formulas: ["A ∩ B, A ∪ B, A - B"]
          duration_target_minutes: 8

        - part: 53
          title: "Logical Venn Diagrams - Three Sets"
          subtopics: ["Three-circle diagrams", "Region identification", "Complex relationships"]
          difficulty: "intermediate"
          formulas: ["n(A ∪ B ∪ C) = n(A) + n(B) + n(C) - n(A∩B) - n(B∩C) - n(A∩C) + n(A∩B∩C)"]
          duration_target_minutes: 8

    - name: "Mathematical Operations & Inequalities"
      category: "verbal_reasoning"
      topics:
        - part: 54
          title: "Mathematical Operations - Symbol Substitution"
          subtopics: ["BODMAS with swapped symbols", "Priority rules", "Equation solving"]
          difficulty: "beginner"
          formulas: ["BODMAS rule", "Symbol swap technique"]
          duration_target_minutes: 8

        - part: 55
          title: "Inequalities - Direct & Coded"
          subtopics: ["Greater/Less than chains", "Coded symbols", "Conclusion derivation"]
          difficulty: "beginner"
          formulas: ["Transitive property: A > B, B > C → A > C"]
          duration_target_minutes: 8

        - part: 56
          title: "Inequalities - Advanced & Either-Or"
          subtopics: ["Either-or in inequalities", "Combined coded inequalities", "Practice"]
          difficulty: "intermediate"
          formulas: ["Complementary inequality pairs"]
          duration_target_minutes: 8

    - name: "Input-Output"
      category: "verbal_reasoning"
      topics:
        - part: 57
          title: "Input-Output - Shifting Based"
          subtopics: ["Word/number arrangement", "Step-by-step tracing", "Pattern identification"]
          difficulty: "intermediate"
          formulas: ["Step tracking method"]
          duration_target_minutes: 8

        - part: 58
          title: "Input-Output - Operation Based"
          subtopics: ["Mathematical operation at each step", "Sorting-based", "Complex rules"]
          difficulty: "advanced"
          formulas: ["Operation sequence identification"]
          duration_target_minutes: 10

    - name: "Data Sufficiency"
      category: "verbal_reasoning"
      topics:
        - part: 59
          title: "Data Sufficiency - Basics"
          subtopics: ["Understanding question format", "Statement analysis", "Alone vs together"]
          difficulty: "beginner"
          formulas: ["5 standard answer choices"]
          duration_target_minutes: 8

        - part: 60
          title: "Data Sufficiency - Advanced"
          subtopics: ["Mathematical DS", "Logical DS", "Combined problems"]
          difficulty: "intermediate"
          formulas: ["Sufficiency testing technique"]
          duration_target_minutes: 10

    - name: "Puzzle - Days & Months"
      category: "verbal_reasoning"
      topics:
        - part: 61
          title: "Scheduling Puzzles - Days of Week"
          subtopics: ["Day assignment", "Order constraints", "Gap conditions"]
          difficulty: "intermediate"
          formulas: ["Day numbering: Mon=1, Sun=7"]
          duration_target_minutes: 10

        - part: 62
          title: "Scheduling Puzzles - Months & Dates"
          subtopics: ["Month assignment", "Date-based puzzles", "Combined conditions"]
          difficulty: "intermediate"
          formulas: ["Month ordering technique"]
          duration_target_minutes: 10

    - name: "Puzzle - Floor Based"
      category: "verbal_reasoning"
      topics:
        - part: 63
          title: "Floor Puzzle - Single Variable"
          subtopics: ["Person-floor mapping", "Above/below conditions", "Gap constraints"]
          difficulty: "intermediate"
          formulas: ["Floor numbering convention"]
          duration_target_minutes: 10

        - part: 64
          title: "Floor Puzzle - Double Variable"
          subtopics: ["Person + attribute on floors", "Multiple constraints", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Matrix-based solving"]
          duration_target_minutes: 10

    - name: "Puzzle - Box & Container"
      category: "verbal_reasoning"
      topics:
        - part: 65
          title: "Box Puzzle - Stacking"
          subtopics: ["Box ordering", "Weight/size conditions", "Relative positions"]
          difficulty: "intermediate"
          formulas: ["Stack ordering technique"]
          duration_target_minutes: 10

        - part: 66
          title: "Box Puzzle - Multi-Attribute"
          subtopics: ["Color + Size + Position", "Complex conditions", "Practice problems"]
          difficulty: "advanced"
          formulas: ["Multi-variable matrix"]
          duration_target_minutes: 10

    - name: "Puzzle - Comparison & Distribution"
      category: "verbal_reasoning"
      topics:
        - part: 67
          title: "Comparison Puzzles"
          subtopics: ["Height/Weight/Age comparison", "Ranking from clues", "Partial information"]
          difficulty: "intermediate"
          formulas: ["Comparison chain building"]
          duration_target_minutes: 8

        - part: 68
          title: "Distribution Puzzles"
          subtopics: ["Item distribution among people", "Quantity constraints", "Practice problems"]
          difficulty: "intermediate"
          formulas: ["Distribution matrix method"]
          duration_target_minutes: 10

    - name: "Alphabet & Word Test"
      category: "verbal_reasoning"
      topics:
        - part: 69
          title: "Alphabet Test"
          subtopics: ["Left/right position", "Rearrangement", "Between positions"]
          difficulty: "beginner"
          formulas: ["Position from right = 27 - Position from left"]
          duration_target_minutes: 8

        - part: 70
          title: "Word Formation & Arrangement"
          subtopics: ["Meaningful words from letters", "Dictionary order", "Word puzzles"]
          difficulty: "intermediate"
          formulas: ["Alphabetical ordering rules"]
          duration_target_minutes: 8

    - name: "Mirror & Water Image"
      category: "verbal_reasoning"
      topics:
        - part: 71
          title: "Mirror Image"
          subtopics: ["Letter mirror images", "Number mirror images", "Clock mirror images"]
          difficulty: "beginner"
          formulas: ["Left-right reversal rule"]
          duration_target_minutes: 8

        - part: 72
          title: "Water Image"
          subtopics: ["Top-bottom reversal", "Combined transformations", "Practice problems"]
          difficulty: "beginner"
          formulas: ["Up-down flip rule"]
          duration_target_minutes: 8

    - name: "Paper Cutting & Folding"
      category: "verbal_reasoning"
      topics:
        - part: 73
          title: "Paper Folding & Cutting"
          subtopics: ["Fold patterns", "Cut symmetry", "Unfolded result prediction"]
          difficulty: "intermediate"
          formulas: ["Symmetry axis counting"]
          duration_target_minutes: 8

        - part: 74
          title: "Paper Folding - Advanced"
          subtopics: ["Multiple folds", "Complex cuts", "Hole counting"]
          difficulty: "advanced"
          formulas: ["Holes = 2^n × cuts (n = number of folds)"]
          duration_target_minutes: 10

    - name: "Dice & Cube"
      category: "verbal_reasoning"
      topics:
        - part: 75
          title: "Dice - Standard & Non-Standard"
          subtopics: ["Standard dice rules", "Opposite face identification", "Adjacent faces"]
          difficulty: "beginner"
          formulas: ["Opposite faces sum = 7 (standard)", "Clockwise rule"]
          duration_target_minutes: 8

        - part: 76
          title: "Dice - Multiple Dice & Open Dice"
          subtopics: ["Two dice comparison", "Open dice folding", "Practice problems"]
          difficulty: "intermediate"
          formulas: ["Open dice folding technique"]
          duration_target_minutes: 8

        - part: 77
          title: "Cube - Cutting & Painting"
          subtopics: ["Cube cutting formula", "Painted faces counting", "Corner/Edge/Face pieces"]
          difficulty: "intermediate"
          formulas: ["Total pieces = n³", "3-face painted = 8", "2-face = 12(n-2)", "1-face = 6(n-2)²", "0-face = (n-2)³"]
          duration_target_minutes: 10

    - name: "Counting Figures"
      category: "verbal_reasoning"
      topics:
        - part: 78
          title: "Counting Triangles"
          subtopics: ["Triangle counting in figures", "Systematic counting", "Formula methods"]
          difficulty: "intermediate"
          formulas: ["Triangle counting formulas for standard figures"]
          duration_target_minutes: 8

        - part: 79
          title: "Counting Squares, Rectangles & Lines"
          subtopics: ["Square counting", "Rectangle counting", "Line segment counting"]
          difficulty: "intermediate"
          formulas: ["Squares in n×n grid = Σk²", "Rectangles = C(m+1,2) × C(n+1,2)"]
          duration_target_minutes: 8

    - name: "Figure Pattern & Completion"
      category: "verbal_reasoning"
      topics:
        - part: 80
          title: "Figure Series Completion"
          subtopics: ["Rotation patterns", "Shading patterns", "Element addition/removal"]
          difficulty: "intermediate"
          formulas: ["Common rotation angles: 45°, 90°, 180°"]
          duration_target_minutes: 8

        - part: 81
          title: "Embedded & Hidden Figures"
          subtopics: ["Finding hidden shapes", "Figure embedding", "Complex figures"]
          difficulty: "intermediate"
          formulas: ["Shape identification technique"]
          duration_target_minutes: 8

    - name: "Clock & Calendar"
      category: "verbal_reasoning"
      topics:
        - part: 82
          title: "Clock - Angle Problems"
          subtopics: ["Hour-minute hand angle", "Meeting/overlap times", "Mirror reflection time"]
          difficulty: "intermediate"
          formulas: ["Angle = |30H - 5.5M|", "Hands meet every 65.45 min", "Mirror time = 11:60 - actual"]
          duration_target_minutes: 8

        - part: 83
          title: "Clock - Faulty Clock Problems"
          subtopics: ["Gaining/losing time", "Correct time calculation", "Relative speed"]
          difficulty: "advanced"
          formulas: ["Gain/Loss per hour calculation"]
          duration_target_minutes: 8

        - part: 84
          title: "Calendar - Day Finding"
          subtopics: ["Odd days concept", "Leap year rules", "Day of any date"]
          difficulty: "beginner"
          formulas: ["Odd days: 1 ordinary year=1, 1 leap year=2", "400 years = 0 odd days"]
          duration_target_minutes: 8

        - part: 85
          title: "Calendar - Advanced Problems"
          subtopics: ["Same calendar year", "Day after N days", "Practice problems"]
          difficulty: "intermediate"
          formulas: ["Same calendar repeats: 6-11-11 or 5-6-11 pattern"]
          duration_target_minutes: 8

    - name: "Coding in a Fictitious Language"
      category: "verbal_reasoning"
      topics:
        - part: 86
          title: "Fictitious Language Coding"
          subtopics: ["Sentence-based codes", "Word mapping", "Grammar rules"]
          difficulty: "intermediate"
          formulas: ["Word-code mapping matrix"]
          duration_target_minutes: 8

    - name: "Order & Ranking (Advanced)"
      category: "verbal_reasoning"
